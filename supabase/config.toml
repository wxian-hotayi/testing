# Minimal Supabase local dev config. `supabase start` boots Postgres + Auth +
# Storage locally; `supabase db reset` applies migrations then seed.sql.
project_id = "vitalis-commerce"

[db]
port = 54322
major_version = 15

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public"]

[studio]
port = 54323

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Configure the Google provider with your OAuth credentials (env-substituted).
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"
